<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PushMatrix - жҺ§еҲ¶еҸ°</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #00ff00;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      overflow: hidden;
    }

    #header {
      background: #1a1a1a;
      padding: 12px 16px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #header h1 {
      font-size: 14px;
      font-weight: normal;
      color: #00ff00;
    }

    #controls {
      display: flex;
      gap: 8px;
    }

    #controls button {
      background: #222;
      border: 1px solid #444;
      color: #00ff00;
      padding: 4px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      border-radius: 3px;
    }

    #controls button:hover {
      background: #333;
    }

    #console {
      height: calc(100vh - 50px);
      overflow-y: auto;
      padding: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .log-entry {
      margin: 2px 0;
      line-height: 1.6;
      padding: 2px 0;
    }

    .log-info { color: #00ff00; }
    .log-warn { color: #ffaa00; }
    .log-error { color: #ff4444; }
    .log-success { color: #00ffff; }
    .log-debug { color: #888888; }

    .timestamp {
      color: #666666;
      margin-right: 8px;
      font-size: 12px;
    }

    .level-tag {
      display: inline-block;
      padding: 1px 6px;
      margin-right: 6px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: bold;
    }

    .level-tag.info { background: #1a4d1a; color: #00ff00; }
    .level-tag.warn { background: #4d3a1a; color: #ffaa00; }
    .level-tag.error { background: #4d1a1a; color: #ff4444; }
    .level-tag.success { background: #1a4d4d; color: #00ffff; }
    .level-tag.debug { background: #2a2a2a; color: #888888; }

    /* ж»ҡеҠЁжқЎж ·ејҸ */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #111111;
    }

    ::-webkit-scrollbar-thumb {
      background: #333333;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555555;
    }

    .separator {
      border-top: 1px solid #333;
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>рҹҡҖ PushMatrix жҺ§еҲ¶еҸ°</h1>
    <div id="controls">
      <button onclick="clearConsole()">жё…з©әж—Ҙеҝ—</button>
      <button onclick="toggleAutoScroll()">иҮӘеҠЁж»ҡеҠЁ: <span id="autoScrollStatus">ејҖ</span></button>
    </div>
  </div>
  <div id="console"></div>

  <script>
    const { ipcRenderer } = require('electron')
    const consoleDiv = document.getElementById('console')
    let autoScroll = true

    function appendLog(data) {
      const entry = document.createElement('div')
      entry.className = `log-entry log-${data.level || 'info'}`

      const timestamp = document.createElement('span')
      timestamp.className = 'timestamp'
      timestamp.textContent = `[${data.timestamp || new Date().toLocaleTimeString('zh-CN', { hour12: false })}]`

      const levelTag = document.createElement('span')
      levelTag.className = `level-tag ${data.level || 'info'}`
      levelTag.textContent = (data.level || 'info').toUpperCase()

      const message = document.createElement('span')
      message.textContent = data.message || data

      if (data.data) {
        const dataSpan = document.createElement('pre')
        dataSpan.style.marginLeft = '24px'
        dataSpan.style.color = '#666'
        dataSpan.style.fontSize = '12px'
        dataSpan.textContent = typeof data.data === 'object'
          ? JSON.stringify(data.data, null, 2)
          : String(data.data)
        entry.appendChild(timestamp)
        entry.appendChild(levelTag)
        entry.appendChild(message)
        entry.appendChild(dataSpan)
      } else {
        entry.appendChild(timestamp)
        entry.appendChild(levelTag)
        entry.appendChild(message)
      }

      consoleDiv.appendChild(entry)

      // иҮӘеҠЁж»ҡеҠЁеҲ°еә•йғЁ
      if (autoScroll) {
        consoleDiv.scrollTop = consoleDiv.scrollHeight
      }
    }

    function clearConsole() {
      consoleDiv.innerHTML = ''
      printWelcome()
    }

    function toggleAutoScroll() {
      autoScroll = !autoScroll
      document.getElementById('autoScrollStatus').textContent = autoScroll ? 'ејҖ' : 'е…і'
    }

    function printWelcome() {
      const separator = '='.repeat(80)
      appendLog({ level: 'success', message: separator })
      appendLog({ level: 'success', message: '  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•—' })
      appendLog({ level: 'success', message: '  в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в•ҡв•җв•җв–Ҳв–Ҳв•”в•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•қ' })
      appendLog({ level: 'success', message: '  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв•”в•қ ' })
      appendLog({ level: 'success', message: '  в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— ' })
      appendLog({ level: 'success', message: '  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘ в•ҡв•җв•қ в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв•—' })
      appendLog({ level: 'success', message: '  в•ҡв•җв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ     в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ   в•ҡв•җв•қ   в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ' })
      appendLog({ level: 'success', message: separator })
      appendLog({ level: 'info', message: '  зүҲжң¬: 1.0.0' })
      appendLog({ level: 'info', message: '  еҗҜеҠЁж—¶й—ҙ: ' + new Date().toLocaleString('zh-CN') })
      appendLog({ level: 'success', message: separator })
    }

    // жҺҘж”¶ж—Ҙеҝ—ж¶ҲжҒҜ
    ipcRenderer.on('append-log', (event, data) => {
      appendLog(data)
    })

    // еҗҜеҠЁж—¶жҳҫзӨәж¬ўиҝҺдҝЎжҒҜ
    printWelcome()
  </script>
</body>
</html>
